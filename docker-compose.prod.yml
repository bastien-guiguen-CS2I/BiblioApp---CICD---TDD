services:
  back:
    image: ghcr.io/bastien-guiguen-cs2i/biblioapp/back:latest
    container_name: biblio-back
    ports:
      - "8080:8080"
    networks:
      - biblio-net

  swagger:
    image: ghcr.io/bastien-guiguen-cs2i/biblioapp/swagger:latest
    container_name: biblio-swagger
    depends_on:
      - back
    ports:
      - "8081:8080"
    networks:
      - biblio-net
    environment:
      - SWAGGER_JSON_URL=http://back:8080/v3/api-docs

  front:
    image: ghcr.io/bastien-guiguen-cs2i/biblioapp/front:latest
    container_name: biblio-front
    depends_on:
      - back
    ports:
      - "4200:80"
    networks:
      - biblio-net

  docs:
    image: ghcr.io/bastien-guiguen-cs2i/biblioapp/docs:latest
    container_name: biblio-docs
    ports:
      - "8082:80"
    networks:
      - biblio-net

networks:
  biblio-net:
    driver: bridge
