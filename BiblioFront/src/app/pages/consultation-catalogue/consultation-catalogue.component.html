<div class="container mx-auto px-4 lg:px-6 py-8 lg:py-12 space-y-8">
    <div class="flex justify-between items-end">
        <div>
            <h1 class="text-4xl lg:text-5xl font-bold text-gray-900">Catalogue</h1>
            <p class="text-gray-500 mt-2">Recherchez parmi nos livres et revues</p>
        </div>
    </div>

    <!-- Search Form -->
    <div class="bg-white p-6 lg:p-8 rounded-2xl shadow-sm border border-gray-200">
        <form (ngSubmit)="handleSearch()" class="space-y-6">
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="flex-1 relative">
                    <input [(ngModel)]="search" name="search" type="text" placeholder="Rechercher par titre..."
                        class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition" />
                    <svg class="absolute left-4 top-3.5 w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <button type="submit"
                    class="px-6 py-3 bg-primary text-white rounded-lg hover:bg-blue-700 transition font-semibold whitespace-nowrap">
                    Rechercher
                </button>
                <button type="button" (click)="toggleAdvanced()"
                    class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-semibold whitespace-nowrap">
                    {{ isAdvanced() ? 'Simple' : 'Avancée' }}
                </button>
            </div>

            <div *ngIf="isAdvanced()" class="grid grid-cols-1 md:grid-cols-3 gap-4 pt-6 border-t border-gray-200">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Auteur</label>
                    <input [(ngModel)]="auteur" name="auteur" type="text" placeholder="Nom de l'auteur"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Année</label>
                    <input [(ngModel)]="annee" name="annee" type="text" placeholder="Année"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Catégorie</label>
                    <select [(ngModel)]="categorie" name="categorie"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none">
                        <option value="">-- Toutes --</option>
                        <option value="roman">Roman</option>
                        <option value="informatique">Informatique</option>
                        <option value="science">Science</option>
                        <option value="histoire">Histoire</option>
                        <option value="policier">Policier</option>
                    </select>
                </div>
            </div>
        </form>
    </div>

    <!-- Results Grid -->
    <div>
        <div *ngIf="isLoading()" class="text-center py-16 text-gray-500">Chargement...</div>
        <div *ngIf="!isLoading() && filteredRessources().length === 0" class="text-center py-16 text-gray-500">
            Aucun résultat trouvé
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div *ngFor="let resource of filteredRessources()"
                class="bg-white rounded-xl shadow hover:shadow-lg transition-shadow border border-gray-200 overflow-hidden flex flex-col h-full">
                <div class="p-6 flex flex-col flex-grow">
                    <div class="flex items-center gap-2 mb-3">
                        <span [class]="'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ' + 
              (resource.type === 'livre' ? 'bg-primary/20 text-primary' : 'bg-purple-100 text-purple-800')">
                            {{ resource.type === 'livre' ? 'Livre' : 'Revue' }}
                        </span>
                    </div>
                    <h3 class="font-semibold text-gray-900 line-clamp-2">{{ resource.titre }}</h3>
                    <p class="text-sm text-gray-600 mt-2">{{ getAuthorOrVolume(resource) }}</p>
                    <p class="text-sm text-gray-500 mt-3">Caution: <span class="font-semibold">{{ resource.caution
                            }}€</span></p>
                    <div class="mt-6 pt-4 border-t border-gray-100">
                        <a [routerLink]="['/catalogue', resource.id]"
                            class="block w-full bg-primary text-white text-center py-2 rounded-lg hover:bg-blue-700 transition text-sm font-semibold">
                            Détails
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
