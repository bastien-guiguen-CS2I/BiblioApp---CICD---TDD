<div class="max-w-2xl mx-auto py-8">
    <div class="mb-8">
        <button (click)="handleCancel()"
            class="inline-flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-6 transition font-medium">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            Retour aux utilisateurs
        </button>
        <h1 class="text-3xl font-bold text-gray-900">Ajouter un Utilisateur</h1>
        <p class="text-gray-500 mt-2">Créer un nouveau compte utilisateur dans le système</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
        <form (ngSubmit)="handleSubmit()" class="space-y-6">
            <!-- Type Selection -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-3">Type d'utilisateur</label>
                <div class="flex gap-4">
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="type" [value]="'etudiant'" [checked]="form().type === 'etudiant'"
                            (change)="onTypeChange('etudiant')"
                            class="w-4 h-4 text-primary focus:ring-2 focus:ring-primary" />
                        <span class="ml-2 text-gray-700">Étudiant</span>
                    </label>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="type" [value]="'enseignant'" [checked]="form().type === 'enseignant'"
                            (change)="onTypeChange('enseignant')"
                            class="w-4 h-4 text-primary focus:ring-2 focus:ring-primary" />
                        <span class="ml-2 text-gray-700">Enseignant</span>
                    </label>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="type" [value]="'particulier'"
                            [checked]="form().type === 'particulier'" (change)="onTypeChange('particulier')"
                            class="w-4 h-4 text-primary focus:ring-2 focus:ring-primary" />
                        <span class="ml-2 text-gray-700">Particulier</span>
                    </label>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="type" [value]="'bibliothecaire'"
                            [checked]="form().type === 'bibliothecaire'" (change)="onTypeChange('bibliothecaire')"
                            class="w-4 h-4 text-primary focus:ring-2 focus:ring-primary" />
                        <span class="ml-2 text-gray-700">Bibliothécaire</span>
                    </label>
                </div>
            </div>

            <!-- Basic Info -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nom *</label>
                    <input type="text" [(ngModel)]="form().nom" [ngModelOptions]="{updateOn: 'change'}" name="nom"
                        placeholder="Dupont"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Prénom *</label>
                    <input type="text" [(ngModel)]="form().prenom" [ngModelOptions]="{updateOn: 'change'}" name="prenom"
                        placeholder="Marie"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                </div>
            </div>

            <!-- Email & Phone -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email *</label>
                    <input type="email" [(ngModel)]="form().email" [ngModelOptions]="{updateOn: 'change'}" name="email"
                        placeholder="marie@example.com"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Téléphone</label>
                    <input type="tel" [(ngModel)]="form().telephone" [ngModelOptions]="{updateOn: 'change'}"
                        name="telephone" placeholder="+33 1 23 45 67 89"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                </div>
            </div>

            <!-- Address -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Adresse</label>
                <input type="text" [(ngModel)]="form().adresse" [ngModelOptions]="{updateOn: 'change'}" name="adresse"
                    placeholder="123 Rue de la Paix, 75000 Paris"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <!-- Type-specific fields -->
            <div *ngIf="form().type === 'etudiant'">
                <label class="block text-sm font-medium text-gray-700 mb-2">Année universitaire *</label>
                <input type="text" [(ngModel)]="form().anneeUniversitaire" [ngModelOptions]="{updateOn: 'change'}"
                    name="anneeUniversitaire" placeholder="3e année"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <div *ngIf="form().type === 'etudiant'">
                <label class="block text-sm font-medium text-gray-700 mb-2">Numéro étudiant *</label>
                <input type="text" [(ngModel)]="form().numeroEtudiant" [ngModelOptions]="{updateOn: 'change'}"
                    name="numeroEtudiant" placeholder="ETU-2026-003"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <div *ngIf="form().type === 'enseignant'">
                <label class="block text-sm font-medium text-gray-700 mb-2">Département *</label>
                <input type="text" [(ngModel)]="form().nomDepartement" [ngModelOptions]="{updateOn: 'change'}"
                    name="nomDepartement" placeholder="Informatique"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <div *ngIf="form().type === 'enseignant'">
                <label class="block text-sm font-medium text-gray-700 mb-2">Grade *</label>
                <input type="text" [(ngModel)]="form().grade" [ngModelOptions]="{updateOn: 'change'}" name="grade"
                    placeholder="Maître de conférences"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <div *ngIf="form().type === 'particulier'">
                <label class="block text-sm font-medium text-gray-700 mb-2">Profession *</label>
                <input type="text" [(ngModel)]="form().profession" [ngModelOptions]="{updateOn: 'change'}"
                    name="profession" placeholder="Consultant"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <div *ngIf="form().type === 'bibliothecaire'">
                <label class="block text-sm font-medium text-gray-700 mb-2">Numéro employé *</label>
                <input type="text" [(ngModel)]="form().numeroEmploye" [ngModelOptions]="{updateOn: 'change'}"
                    name="numeroEmploye" placeholder="EMP-0001"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <!-- Caution -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Solde disponible (€)</label>
                <input type="number" [(ngModel)]="form().soldeDisponible" [ngModelOptions]="{updateOn: 'change'}"
                    name="soldeDisponible" min="0" step="0.01"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
                <p class="text-xs text-gray-500 mt-1">Montant initial du compte utilisateur</p>
            </div>

            <!-- Actions -->
            <div class="flex gap-3 pt-6 border-t border-gray-200">
                <button type="button" (click)="handleCancel()"
                    class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition font-medium">
                    Annuler
                </button>
                <button type="submit" [disabled]="isSubmitting()"
                    class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-700 transition font-medium disabled:opacity-50">
                    {{ isSubmitting() ? 'Création...' : 'Créer utilisateur' }}
                </button>
            </div>
        </form>
    </div>
</div>
