<!-- Overlay sombre -->
<div class="fixed inset-0 bg-black/50 z-40"></div>

<!-- Dialog Modal -->
<div class="fixed inset-0 flex items-center justify-center z-50">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl">
        <!-- Header avec bouton fermeture -->
        <div class="flex justify-between items-center p-6 border-b border-gray-200">
            <h1 class="text-2xl font-bold text-gray-900">Connexion</h1>
            <button (click)="handleClose()" class="p-2 hover:bg-gray-100 rounded-lg transition">
                <svg class="w-6 h-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Content -->
        <div class="p-8">
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C6.5 6.253 2 10.753 2 16.5S6.5 26.747 12 26.747s10-4.5 10-10.247S17.5 6.253 12 6.253z" />
                    </svg>
                </div>
                <p class="text-gray-500 text-sm mt-2">Accédez à votre espace BiblioApp</p>
            </div>

            <form (ngSubmit)="handleSubmit()" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input [(ngModel)]="email" name="email" type="email" placeholder="votre.email@exemple.fr"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
                    <input [(ngModel)]="password" name="password" type="password" placeholder="••••••••"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition" />
                </div>

                <button type="submit" [disabled]="isLoading()"
                    class="w-full bg-primary text-white py-2 px-4 rounded-lg font-medium hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    {{ isLoading() ? 'Connexion en cours...' : 'Se connecter' }}
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-200">
                <p class="text-sm text-gray-600 mb-4 font-medium">Comptes de test (Mock)</p>
                <div class="space-y-2 max-h-48 overflow-y-auto">
                    <div *ngFor="let user of mockUsers"
                        class="text-xs text-gray-500 p-2 bg-gray-50 rounded hover:bg-gray-100 cursor-pointer"
                        (click)="selectMockUser(user)">
                        <strong>{{ user.email }}</strong> - {{ user.prenom }} {{ user.nom }}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
