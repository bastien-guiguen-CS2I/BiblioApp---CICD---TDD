<div class="max-w-2xl mx-auto py-8" *ngIf="!isLoading()">
    <div class="mb-8">
        <button (click)="handleCancel()"
            class="inline-flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-6 transition font-medium">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            Retour au catalogue
        </button>
        <h1 class="text-3xl font-bold text-gray-900">Modifier une Ressource</h1>
        <p class="text-gray-500 mt-2" *ngIf="resource()">
            {{ resource()?.type === 'livre' ? 'Livre' : 'Revue' }} - {{ resource()?.titre }}
        </p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
        <form (ngSubmit)="handleSubmit()" class="space-y-6" *ngIf="resource()">

            <!-- Type Badge -->
            <div class="inline-block px-3 py-1 rounded-full text-sm font-medium" [class]="resource()?.type === 'livre' 
          ? 'bg-primary/20 text-primary' 
          : 'bg-purple-100 text-purple-800'">
                {{ resource()?.type === 'livre' ? 'Livre' : 'Revue' }}
            </div>

            <!-- Titre -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Titre *</label>
                <input type="text" [(ngModel)]="form().titre" [ngModelOptions]="{updateOn: 'change'}" name="titre"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <!-- Auteur ou Volume -->
            <div *ngIf="getType() === 'livre'">
                <label class="block text-sm font-medium text-gray-700 mb-2">Auteur *</label>
                <input type="text" [(ngModel)]="form().auteur" [ngModelOptions]="{updateOn: 'change'}" name="auteur"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <div *ngIf="getType() === 'revue'">
                <label class="block text-sm font-medium text-gray-700 mb-2">Numéro de volume *</label>
                <input type="number" [(ngModel)]="form().volume" [ngModelOptions]="{updateOn: 'change'}" name="volume"
                    min="1"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <!-- ISBN -->
            <div *ngIf="getType() === 'livre'">
                <label class="block text-sm font-medium text-gray-700 mb-2">ISBN</label>
                <input type="text" [(ngModel)]="form().isbn" [ngModelOptions]="{updateOn: 'change'}" name="isbn"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <!-- Date -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Date de publication</label>
                <input type="date" [(ngModel)]="form().datePublication" [ngModelOptions]="{updateOn: 'change'}"
                    name="datePublication"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <!-- Caution -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Caution (€) *</label>
                <input type="number" [(ngModel)]="form().caution" [ngModelOptions]="{updateOn: 'change'}" name="caution"
                    min="0" step="0.01"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <!-- Localisation -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Localisation</label>
                <input type="text" [(ngModel)]="form().localisation" [ngModelOptions]="{updateOn: 'change'}"
                    name="localisation"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none" />
            </div>

            <!-- Info -->
            <div class="p-3 bg-primary/10 border border-primary/20 rounded-lg text-sm text-primary">
                Exemplaires affectés: <span class="font-medium">{{ exemplairesCount() }}</span>
            </div>

            <!-- Actions -->
            <div class="flex gap-3 pt-6 border-t border-gray-200">
                <button type="button" (click)="handleCancel()"
                    class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition font-medium">
                    Annuler
                </button>
                <button type="submit" [disabled]="isSubmitting()"
                    class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-700 transition font-medium disabled:opacity-50">
                    {{ isSubmitting() ? 'Modification...' : 'Enregistrer' }}
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Loading -->
<div *ngIf="isLoading()" class="flex items-center justify-center min-h-screen">
    <div class="text-center">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
        <p class="mt-4 text-gray-500">Chargement...</p>
    </div>
</div>
