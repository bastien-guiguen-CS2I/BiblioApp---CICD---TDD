# ============================================================================
#
# Zensical configuration for BiblioApp
#
# ============================================================================

[project]
site_name = "BiblioApp - CICD - TDD Documentation"
docs_dir = "."
site_dir = "site"
site_description = "Documentation for BiblioApp - Component Integrated Continuous Development with TDD"
site_author = "BiblioApp Team"
site_url = "https://zensical.org/biblio-app"
copyright = "Copyright &copy; 2025 BiblioApp Team"

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/bastien-guiguen-CS2I/BiblioApp"

[[project.nav]]
Home = "index.md"

[[project.nav]]
"Vue d'ensemble" = ["overview/architecture.md"]

[[project.nav]]
Backend = ["backend/stack.md", "backend/api.md", "backend/tests.md"]

[[project.nav]]
Frontend = ["frontend/stack.md"]

[[project.nav]]
"CI/CD & Développement" = ["cicd/workflows.md", "cicd/versioning.md", "cicd/conventions.md"]