name: Build & Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Back
        run: |
          docker build -t ghcr.io/${{ github.repository }}/back:latest ./BiblioBack
          docker push ghcr.io/${{ github.repository }}/back:latest

      - name: Build & Push Front
        run: |
          docker build -t ghcr.io/${{ github.repository }}/front:latest ./BiblioFront
          docker push ghcr.io/${{ github.repository }}/front:latest

      - name: Build & Push Swagger
        run: |
          docker build -t ghcr.io/${{ github.repository }}/swagger:latest ./docker/swagger
          docker push ghcr.io/${{ github.repository }}/swagger:latest

      - name: Build & Push Docs
        run: |
          docker build -t ghcr.io/${{ github.repository }}/docs:latest ./docs
          docker push ghcr.io/${{ github.repository }}/docs:latest