name: Build & Push Docker Images

on:
  workflow_call:

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io/bastien-guiguen-cs2i/biblioapp

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Back
        run: |
          docker build -t $REGISTRY/back:latest ./BiblioBack
          docker push $REGISTRY/back:latest

      - name: Build & Push Front
        run: |
          docker build -t $REGISTRY/front:latest ./BiblioFront
          docker push $REGISTRY/front:latest

      - name: Build & Push Swagger
        run: |
          docker build -t $REGISTRY/swagger:latest ./docker/swagger
          docker push $REGISTRY/swagger:latest

      - name: Build & Push Docs
        run: |
          docker build -f docs/Dockerfile -t $REGISTRY/docs:latest .
          docker push $REGISTRY/docs:latest