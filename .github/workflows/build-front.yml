name: Build Frontend

on:
  workflow_call:
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: BiblioFront/package-lock.json

      - name: Install dependencies
        run: |
          cd BiblioFront
          npm ci

      - name: Lint
        run: |
          cd BiblioFront
          npm run lint

      - name: Build
        run: |
          cd BiblioFront
          npm run build
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-artifacts
          path: BiblioFront/dist/